name: Daily News Bot

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发（GitHub 页面上可以点按钮立即运行）

# 同一时间只允许一个实例运行，防止手动触发与定时触发叠加产生多份 LLM 消耗
concurrency:
  group: daily-news-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 peaceiris/actions-gh-pages 推送到 gh-pages 分支

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 恢复缓存的状态文件（seen_urls + analysis_cache，保证去重正常工作）
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            seen_urls.json
            analysis_cache.json
          key: bot-state-${{ github.run_number }}
          restore-keys: |
            bot-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FAST_MODEL: ${{ secrets.LLM_FAST_MODEL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_GIST_ID: ${{ secrets.BOT_GIST_ID }}
          SHARE_MODE: gist
          SCHEDULE_TIME: "10:00"
          LOOKBACK_HOURS: "24"
          TOP_N: "5"
          # 告诉 HTML 模板用哪个 URL 做实时 AI 分析
          ANALYZE_API_URL: ${{ secrets.ANALYZE_API_URL }}
        run: python scheduler.py --now

      - name: Commit updated state cache back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json analysis_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update news cache [skip ci]"
          git push || true

      - name: Prepare deploy directory
        run: |
          mkdir -p ./public
          cp latest_news.html ./public/index.html

      - name: Deploy HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "chore: update daily news report [skip ci]"
