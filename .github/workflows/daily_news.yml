name: Daily News Bot

on:
  schedule:
    # Multiple best-effort windows around local noon to reduce GitHub Actions drift.
    - cron: '58 3 * * *'
    - cron: '8 4 * * *'
    - cron: '18 4 * * *'
    - cron: '28 4 * * *'
  workflow_dispatch:

concurrency:
  group: daily-news-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            seen_urls.json
            analysis_cache.json
            push_state.json
          key: bot-state-${{ github.run_number }}
          restore-keys: |
            bot-state-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_FAST_MODEL: ${{ secrets.LLM_FAST_MODEL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_GIST_ID: ${{ secrets.BOT_GIST_ID }}
          SHARE_MODE: gist
          REPORT_PUBLIC_URL: "https://saikadance.github.io/ai-news-bot/"
          TZ: "Asia/Hong_Kong"
          BOT_TIMEZONE: "Asia/Hong_Kong"
          SCHEDULE_TIME: "12:08"
          LOOKBACK_HOURS: "24"
          TOP_N: "5"
          ANALYZE_API_URL: ${{ secrets.ANALYZE_API_URL }}
        run: python scheduler.py --now

      - name: Collect optional news metrics
        run: python news_metrics/collector.py --limit 30 || true

      - name: Commit updated state cache back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json analysis_cache.json top5_cache.json push_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update news cache [skip ci]"
          git push || true

      - name: Prepare deploy directory
        run: |
          mkdir -p ./public
          cp latest_news.html ./public/index.html
          if [ -f news_metrics/latest_metrics.json ]; then
            mkdir -p ./public/news_metrics
            cp news_metrics/latest_metrics.json ./public/news_metrics/latest_metrics.json
          fi

      - name: Deploy HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "chore: update daily news report [skip ci]"
